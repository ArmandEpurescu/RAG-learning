name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile
        run: python -m compileall rag tests

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: CLI smoke test
        run: |
          python -m rag ingest data --reset
          python -m rag ask "documente personale surse citate"
